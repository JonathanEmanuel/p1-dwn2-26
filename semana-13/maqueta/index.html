<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
    <title>App de Tareas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1> App de Tareas</h1>
    </header>
    <main>
        <div class="row">
            <h4>Pendientes  <span id="sCompletadas">0</span></h4> |
            <h4>Completadas <span id="sPendientes">0</span></h4>
        </div>

        <div class="mt-2">
            <form class="row">
                <input id="inputNombre" class="control" type="text" placeholder="Tarea...">
                <input id="inputFecha" type="date" class="control" placeholder="05/06/26">
                <button id="btnAgregar" type="submit" class="btn">Agregar</button>
            </form>
            <div class="error"></div>
        </div>
        <ul id="ulLista" class="mt-2 lista">
            <li>
                <span>Sacar turno para el veterinario</span>
                <strong>04/06/26</strong>
            </li>
        </ul>
    </main>
    <footer>
        <p>EMAE | Programación I | 2026</p>
    </footer>
    <script src="tareas.js"></script>
</body>
</html>
